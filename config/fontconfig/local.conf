<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- 当要求显示中文有衬线字体的时候，使用"思源宋体" -->
  <match>
    <!-- 注意：即使设为 zh-cn 也依然匹配 zh ，如果你需要精确的匹配，应使用 compare="eq" -->
    <test name="lang" compare="contains"><string>zh</string></test>
    <test name="family"><string>serif</string></test>
    <edit name="family" mode="append"><string>Sarasa Gothic SC</string></edit>
  </match>
  <!-- 当要求显示中文有衬线字体的时候，使用"思源等宽" -->
  <match>
    <!-- 注意：即使设为 zh-cn 也依然匹配 zh ，如果你需要精确的匹配，应使用 compare="eq" -->
    <test name="lang" compare="contains"><string>zh</string></test>
    <test name="family"><string>monospace</string></test>
    <edit name="family" mode="append"><string>Sarasa Mono SC</string></edit>
  </match>
  <!-- 当要求显示中文有衬线字体的时候，使用"思源黑体" -->
  <match>
    <!-- 注意：即使设为 zh-cn 也依然匹配 zh ，如果你需要精确的匹配，应使用 compare="eq" -->
    <test name="lang" compare="contains"><string>zh</string></test>
    <test name="family"><string>sans-serif</string></test>
    <edit name="family" mode="append"><string>Sarasa UI SC</string></edit>
  </match>

  <!-- 配置 Emoji  -->
  <!-- 因为 Firefox 和 google-chrome 的配置有冲突，所以分别配置-->
  <!-- Google-chrome 系列配置 -->
  <!-- BUG: 0x263A 字符（☺）无法显示彩色，会被其它字体覆盖 -->
  <!-- BUG: xst 中使用 P10k 主题中某些字符和 Color Emoji 冲突 -->
  <match>
    <test name="prgname" qual="all" compare="not_contains"><string>firefox</string></test>
    <test name="prgname" qual="all" compare="not_contains"><string>st</string></test>
    <test name="family" qual="any" compare="not_contains"><string>emoji</string></test>
    <edit name="family" mode="append"><string>Noto Color Emoji</string></edit>
  </match>
  <!--  Firefox 配置-->
  <match target="pattern">
    <test name="prgname" qual="all" compare="contains"><string>firefox</string></test>
    <edit name="family" mode="prepend"><string>Noto Color Emoji</string></edit>
  </match>

  <match target="font">
	  <test name="family"><string>Noto Color Emoji</string></test>
    <edit name="antialias" mode="assign"><bool>false</bool></edit>
    <edit name="hinting" mode="assign"><bool>false</bool></edit>
	  <edit name="embeddedbitmap"><bool>true</bool></edit>
  </match>
  <alias><family>JoyPixels</family><prefer><family>Noto Color Emoji</family></prefer></alias>
  <alias><family>Twemoji</family><prefer><family>Noto Color Emoji</family></prefer></alias>
  <alias><family>Twitter Color Emoji</family><prefer><family>Noto Color Emoji</family></prefer></alias>
  <alias><family>Segoe UI Emoji</family><prefer><family>Noto Color Emoji</family></prefer></alias>

</fontconfig>
