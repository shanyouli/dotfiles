<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Arial 字体配置 -->
  <alias binding="same"><family>Arial</family><accept><family>sans-serif</family></accept></alias>

  <!-- 禁用多个字体 -->
  <selectfont>
    <rejectfont>
        <!-- <glob>/usr/share/fonts/OTF/*</glob> -->
    </rejectfont>
  </selectfont>

  <!-- Chinese 字体配置 -->
  <!-- 配置 Emoji  -->
  <!-- 因为 Firefox 和 google-chrome 的配置有冲突，所以分别配置-->
  <!-- Google-chrome 系列配置 -->
  <!-- BUG: 0x263A 字符（☺）无法显示彩色，会被其它字体覆盖 -->
  <!-- BUG: xst 中使用 P10k 主题中某些字符和 Color Emoji 冲突 -->
  <match target="pattern">
    <!-- <test name="prgname" qual="all" compare="contains"><string>firefox</string></test> -->
    <edit name="family" mode="prepend"><string>emoji</string></edit>
  </match>


  <alias binding="same">
    <family>monospace</family>
    <accept>
      <family>mononoki Nerd Font Mono</family>
      <family>WenQuanYi Micro Hei Mono</family>
    </accept>
  </alias>
  <alias binding="same">
    <family>serif</family>
    <accept><family>WenQuanYi Micro Hei</family></accept>
  </alias>

  <alias binding="same">
    <family>sans-serif</family>
    <accept><family>WenQuanYi Micro Hei</family></accept>
  </alias>

  <match>
    <edit name="family" mode="append_last">
      <string>Unifont</string>
      <string>Symbola</string>
    </edit>
  </match>

  <match target="font">
	  <test name="family"><string>Noto Color Emoji</string></test>
    <edit name="antialias" mode="assign"><bool>false</bool></edit>
    <edit name="hinting" mode="assign"><bool>false</bool></edit>
	  <edit name="embeddedbitmap"><bool>true</bool></edit>
  </match>
  <alias><family>JoyPixels</family><prefer><family>Noto Color Emoji</family></prefer></alias>
  <alias><family>Twemoji</family><prefer><family>Noto Color Emoji</family></prefer></alias>
  <alias><family>Twitter Color Emoji</family><prefer><family>Noto Color Emoji</family></prefer></alias>
  <alias><family>Segoe UI Emoji</family><prefer><family>Noto Color Emoji</family></prefer></alias>

</fontconfig>
