# 精简版 mpv 配置：保留普通播放器常用能力，并提供一个通用锐化 shader。

########
# 基础 #
########

profile=fast
hwdec=auto-safe
vo=gpu-next
gpu-api=auto

title=${?media-title:${media-title}}${!media-title:${filename}}
autofit-larger=80%x80%
autofit-smaller=40%x30%
keep-open=yes
save-position-on-quit=yes
watch-later-dir="~~/cache/watch_later"
watch-later-options=start,vid,aid,sid
reset-on-next-file=vid,aid,sid,vf,af,loop-file,deinterlace,contrast,brightness,gamma,saturation,hue,video-zoom,video-rotate,video-pan-x,video-pan-y,panscan,speed,audio-delay,sub-pos,sub-scale,sub-delay,sub-speed,sub-visibility

########
# 界面 #
########

osc=yes
osd-on-seek=msg-bar
osd-duration=1800
osd-font-size=28
osd-color="#FFFFFFFF"
osd-border-color="#FF000000"
osd-border-size=1.0
osd-shadow-offset=0.5
osd-shadow-color="#FF000000"

########
# 视频 #
########

# Default general-purpose image quality preset:
# - Keep performance overhead low
# - Improve perceived sharpness on most videos
# Shader download/save paths:
# - ~~/shaders/adaptive-sharpen.glsl
# - ~~/shaders/FSRCNNX_x2_8-0-4-1_LineArt.glsl
scale=spline36
cscale=spline36
dscale=mitchell
correct-downscaling=yes
linear-downscaling=no
sigmoid-upscaling=yes
dither-depth=auto
deband=no

# Enabled by default: lightweight adaptive sharpen.
glsl-shaders="~~/shaders/adaptive-sharpen.glsl"

# Alternative preset kept here but disabled by default:
# - Better suited for animation / low-resolution content / heavy upscaling
# - Higher GPU cost than the default preset
# glsl-shaders="~~/shaders/FSRCNNX_x2_8-0-4-1_LineArt.glsl"
# glsl-shaders-append="~~/shaders/adaptive-sharpen.glsl"

########
# 音频 #
########

audio-device=auto
audio-channels=auto-safe
volume-max=150
gapless-audio=no
audio-file-auto=fuzzy
audio-file-paths=audio;audios
alang=japanese,jpn,ja,english,eng,en,zh-CN,zh-Hans,chi,zho,zh

########
# 字幕 #
########

sub-auto=fuzzy
sub-file-paths=sub;subs;subtitles;字幕
sub-codepage=auto
slang=chs,sc,zh-CN,zh-Hans,cht,tc,zh-Hant,zh-HK,zh-TW,chi,zho,zh,en,eng
sub-font-size=46
sub-bold=yes
sub-color="#FFFFFFFF"
sub-border-size=0.7
sub-border-color="#FF000000"
sub-shadow-offset=0.5
sub-shadow-color="#FF000000"

########
# 截图 #
########

screenshot-format=png
screenshot-directory="~~/files/screen"
screenshot-template="%F-%P-%n"

########
# 日志 #
########

msg-level=all=status
