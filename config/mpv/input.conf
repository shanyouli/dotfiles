# 精简版快捷键：保留普通播放器常用操作，并只接入少量选定脚本。

SPACE           cycle pause
MBTN_LEFT       cycle pause
PLAYPAUSE       cycle pause
PLAY            cycle pause
PAUSE           cycle pause

q               quit
Q               quit-watch-later
ESC             set fullscreen no
ENTER           cycle fullscreen
f               cycle fullscreen
m               cycle mute

RIGHT           seek  5
LEFT            seek -5
UP              seek  60
DOWN            seek -60
SHIFT+RIGHT     seek  1 exact
SHIFT+LEFT      seek -1 exact
.               frame-step
,               frame-back-step

Wheel_Up        add volume  2
Wheel_Down      add volume -2
9               add volume -5
0               add volume  5

[               add speed -0.1
]               add speed  0.1
BS              set speed 1.0

PGUP            add chapter  1
PGDWN           add chapter -1
>               playlist-next
<               playlist-prev
NEXT            playlist-next
PREV            playlist-prev

j               cycle sub
v               cycle sub-visibility
z               add sub-delay -0.1
x               add sub-delay  0.1
r               add sub-pos -1
t               add sub-pos  1
SHIFT+BS        set sub-pos 100; set sub-scale 1.0; set sub-delay 0

y               cycle audio
CTRL+,          add audio-delay -0.1
CTRL+.          add audio-delay  0.1
;               set audio-delay 0

A               cycle-values video-aspect-override 16:9 4:3 2.35:1 -1
d               cycle deinterlace
D               cycle deband
1               add contrast -1
2               add contrast  1
3               add brightness -1
4               add brightness  1
5               add gamma -1
6               add gamma  1
7               add saturation -1
8               add saturation  1
CTRL+BS         set contrast 0; set brightness 0; set gamma 0; set saturation 0; set hue 0

s               screenshot subtitles
S               screenshot video
CTRL+s          screenshot window

i               script-binding stats/display-stats
I               script-binding stats/display-stats-toggle
O               cycle-values osd-level 3 1

U               change-list glsl-shaders toggle "~~/shaders/adaptive-sharpen.glsl"; show-text "锐化 shader: ${glsl-shaders}"
CTRL+U          change-list glsl-shaders clr ""; show-text "已清空 shader"

POWER           quit
STOP            quit
FORWARD         seek  30
REWIND          seek -30

# 脚本功能
o               script-binding uosc/open-file
TAB             script-message-to file_browser browse-files; script-message-to file_browser dynamic/reload
`               script-binding recentmenu/open
CTRL+L          script-binding recentmenu/last
CTRL+l          script-binding recentmenu/last
N               script-message-to simplebookmark open-list
CTRL+n          script-message-to simplebookmark bookmark-save
F5              script-message playlistmanager showplaylist
F6              script-message-to adevice_list toggle-adevice-browser
F7              script-message-to edition_list toggle-edition-browser
F8              script-message-to chapter_list toggle-chapter-browser
F9              script-message-to track_list toggle-vidtrack-browser
F10             script-message-to track_list toggle-audtrack-browser
F11             script-message-to track_list toggle-subtrack-browser
F12             script-binding manager-update-all
CTRL+F          script-binding quality_menu/video_formats_toggle
ALT+F           script-binding quality_menu/audio_formats_toggle
ALT+Y           script-message-to youtube_download menu
CTRL+f          script-binding subtitle_lines/list_subtitles
C               script-binding dynamic_crop/toggle_crop
ALT+c           script-binding slicing_copy/slicing_mark
ALT+a           script-binding slicing_copy/slicing_audio
ALT+C           script-binding slicing_copy/clear_slicing_mark
w               script-binding mpv_animated/set_animated_start
W               script-binding mpv_animated/set_animated_end
CTRL+w          script-binding mpv_animated/make_animated
CTRL+W          script-binding mpv_animated/make_animated_with_subtitles
CTRL+ALT+t      script-message set-clipboard ${time-pos}
CTRL+ALT+p      script-message set-clipboard ${path}
CTRL+ALT+s      script-message set-clipboard ${sub-text}
